project:
  title: "Wordbank"
  type: website
  resources:
    - "slices/**"
    - "resources/**"

website:
  favicon: images/favicon.ico
  navbar:
    logo: images/walrus.png
    title: Wordbank
    left:
      - href: index.qmd
        text: Home
      - text: Analyses
        menu:
          - href: norms.qmd
            text: Vocabulary Norms
          - href: trajectories.qmd
            text: Item Trajectories
          - href: crossling.qmd
            text: Cross-Linguistic Trajectories
          - href: scoring.qmd
            text: CDI Scoring
      - href: data.qmd
        text: Data
      - href: contributors.qmd
        text: Contributors
      - href: blog.qmd
        text: Blog
      - href: about.qmd
        text: About
      - href: faq.qmd
        text: FAQ
  page-footer:
    center: |
      [![](https://i.creativecommons.org/l/by/4.0/88x31.png)](http://creativecommons.org/licenses/by/4.0/)<br>
      Unless otherwise stated, Wordbank and its datasets are licensed under a
      [Creative Commons Attribution 4.0 International License](http://creativecommons.org/licenses/by/4.0/).
      See our [FAQ](faq.html#what-is-the-license-for-derivative-works-from-wordbank-e.g.-graphs-generated-by-the-site) for more information.

format:
  datapage-html:
    theme: theme.scss
    mainfont: "Helvetica Neue, Helvetica, Arial, sans-serif"
    fontsize: 14px

execute:
  echo: false
  message: false
  warning: false
  error: false

# canonical data store; render-time loading falls back to this when
# local data/ parquet files (from etl/extract_wordbank.R) are absent
redivis:
  organization: datapages
  dataset: wordbank
